{% load dashboard_extras %}
<div id="page-reactionroles" class="page">
  <div class="page-header">
    <h1><span class="mi">assignment</span> Reaction Roles</h1>
    <div class="module-toggle"><label class="toggle"><input type="checkbox" id="reactionroles_enabled" onchange="updateSetting('reactionroles_enabled', this.checked ? '1' : '0')"{% if settings|get:'reactionroles_enabled' == '1' %} checked{% endif %}><span class="slider"></span></label><span>Modul aktivieren</span></div>
  </div>
  <div class="card"><div class="card-header"><h2>Verwaltung</h2></div>
    <div class="card-body">
      <p>Verwende diese Discord-Befehle:</p>
      <ul style="margin:12px 0;padding-left:20px;color:rgba(255,255,255,0.7)">
        <li><code>/reactionrole add @Rolle :emoji: Label</code> — Rolle hinzufügen</li>
        <li><code>/reactionrole panel</code> — Panel senden</li>
      </ul>
    </div>
  </div>
</div>
