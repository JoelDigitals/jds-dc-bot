{% load dashboard_extras %}
<div id="page-verification" class="page">
  <div class="page-header"><h1><span class="mi">verified</span> Verification</h1><div class="module-toggle"><label class="toggle"><input type="checkbox" id="verification_enabled" onchange="updateSetting('verification_enabled', this.checked ? '1' : '0')"{% if settings|get:'verification_enabled' == '1' %} checked{% endif %}><span class="slider"></span></label><span>Modul aktivieren</span></div></div>
  <div class="card"><div class="card-header"><h2>Einrichtung</h2></div>
    <div class="card-body">
      <p>1. <code>/verify setup @Rolle</code> — Rolle festlegen</p>
      <p>2. <code>/verify panel</code> — Button-Panel senden</p>
      <p style="color:rgba(255,255,255,0.5);font-size:13px"><span class="mi" style="font-size:13px">check_circle</span> Nutzer klicken auf Button → erhalten die Rolle</p>
    </div>
  </div>
</div>
