{% load dashboard_extras %}
<div id="page-customcommands" class="page">
  <div class="page-header"><h1><span class="mi">keyboard</span> Custom Commands</h1><div class="module-toggle"><label class="toggle"><input type="checkbox" id="customcommands_enabled" onchange="updateSetting('customcommands_enabled', this.checked ? '1' : '0')"{% if settings|get:'customcommands_enabled' == '1' %} checked{% endif %}><span class="slider"></span></label><span>Modul aktivieren</span></div></div>
  <div class="card"><div class="card-header"><h2>Verwaltung</h2></div>
    <div class="card-body">
      <p>Nutze diese Discord-Befehle:</p>
      <ul style="margin:12px 0;padding-left:20px;color:rgba(255,255,255,0.7)">
        <li><code>/cc add name:"regeln" antwort:"Hier sind die Regeln..."</code></li>
        <li><code>/cc remove name:"regeln"</code></li>
        <li><code>/cc list</code></li>
      </ul>
      <p style="color:rgba(255,255,255,0.5);font-size:13px"><span class="mi" style="font-size:13px">info</span> Nutzer rufen mit Prefix <code>!</code> auf: <code>!regeln</code></p>
    </div>
  </div>
</div>
