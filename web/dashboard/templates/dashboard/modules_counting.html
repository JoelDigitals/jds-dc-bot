{% load dashboard_extras %}
<div id="page-counting" class="page">
  <div class="page-header"><h1><span class="mi">pin</span> Counting Game</h1><div class="module-toggle"><label class="toggle"><input type="checkbox" id="counting_enabled" onchange="updateSetting('counting_enabled', this.checked ? '1' : '0')"{% if settings|get:'counting_enabled' == '1' %} checked{% endif %}><span class="slider"></span></label><span>Modul aktivieren</span></div></div>
  <div class="card"><div class="card-header"><h2>Einrichtung</h2></div>
    <div class="card-body">
      <p>Nutze <code>/counting #channel</code> um einen Zähl-Channel festzulegen.</p>
      <p style="color:rgba(255,255,255,0.5);font-size:13px"><span class="mi" style="font-size:13px">pin</span> Nutzer zählen hoch, Fehler setzt zurück. Meilensteine bei 10/50/100</p>
    </div>
  </div>
</div>
