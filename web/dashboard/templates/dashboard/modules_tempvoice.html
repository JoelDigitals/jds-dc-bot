{% load dashboard_extras %}
<div id="page-tempvoice" class="page">
  <div class="page-header">
    <h1><span class="mi">volume_up</span> Temp Voice</h1>
    <div class="module-toggle"><label class="toggle"><input type="checkbox" id="tempvoice_enabled" onchange="updateSetting('tempvoice_enabled', this.checked ? '1' : '0')"{% if settings|get:'tempvoice_enabled' == '1' %} checked{% endif %}><span class="slider"></span></label><span>Modul aktivieren</span></div>
  </div>
  <div class="card"><div class="card-header"><h2>Einstellungen</h2></div>
    <div class="card-body">
      <div class="form-group"><label>Voice-Channel (Eintritt)</label>{% channel_select 'tempvoice_channel_id' 'Channel auswählen' 'voice' %}<small>Nutzer betreten diesen Channel → temporärer Channel wird erstellt</small></div>
      <div class="form-group"><label>Kategorie (für temporäre Channels)</label>{% channel_select 'tempvoice_category_id' 'Kategorie auswählen' 'category' %}</div>
    </div>
  </div>
</div>
